name: Preview Release

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.decide.outputs.result }}
    steps:
      - name: Decide whether to publish
        id: decide
        run: |
          # For pull_request events (open/push/reopen/ready_for_review),
          # check if the PR author is a maintainer.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ASSOCIATION="${{ github.event.pull_request.author_association }}"
          else
            # For pull_request_review events, only proceed if the review
            # is an approval.
            if [ "${{ github.event.review.state }}" = "approved" ]; then
              # Check if the approving reviewer is a maintainer.
              ASSOCIATION="${{ github.event.review.author_association }}"
            else
              echo "result=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Only MEMBER (org member) and OWNER (repo/org owner) are
          # considered maintainers and can trigger a preview release.
          if [ "$ASSOCIATION" = "MEMBER" ] || [ "$ASSOCIATION" = "OWNER" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pkg.pr.new:443
            registry.npmjs.org:443
            telemetry.vercel.com:443
            token.actions.githubusercontent.com:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:lib
      - run: pnpm run lint:lib
      - run: pnpm run test:lib
      - name: Publish preview packages
        run: pnpm dlx pkg-pr-new@0.0.71 publish './packages/*' --no-template --packageManager=pnpm --pnpm
