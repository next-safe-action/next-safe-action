<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 300" width="740" height="300">
	<defs>
		<marker id="mf-l" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
			<polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
		</marker>
		<marker id="mf-lg" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
			<polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
		</marker>
	</defs>
	<!-- Timeline labels -->
	<text x="80" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b">Logging MW</text>
	<text x="260" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b">Auth MW</text>
	<text x="440" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b">Validated MW</text>
	<text x="620" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b">Server Code</text>
	<!-- Vertical lines -->
	<line x1="80" y1="24" x2="80" y2="292" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4 3"/>
	<line x1="260" y1="24" x2="260" y2="292" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4 3"/>
	<line x1="440" y1="24" x2="440" y2="292" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4 3"/>
	<line x1="620" y1="24" x2="620" y2="292" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4 3"/>
	<!-- Step 1: Log start -->
	<rect x="20" y="36" width="120" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
	<text x="80" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#92400e">console.log(start)</text>
	<!-- Arrow: call next -->
	<line x1="145" y1="60" x2="198" y2="76" stroke="#6b7280" stroke-width="1.5" marker-end="url(#mf-l)"/>
	<text x="175" y="64" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">next()</text>
	<!-- Step 2: Get session -->
	<rect x="200" y="76" width="120" height="28" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
	<text x="260" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1e40af">getSession()</text>
	<!-- Arrow: validate + call next -->
	<line x1="325" y1="100" x2="378" y2="116" stroke="#6b7280" stroke-width="1.5" marker-end="url(#mf-l)"/>
	<text x="355" y="104" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">validate + next()</text>
	<!-- Step 3: Validated middleware -->
	<rect x="380" y="116" width="120" height="28" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
	<text x="440" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">check(parsedInput)</text>
	<!-- Arrow: call next with ctx -->
	<line x1="505" y1="140" x2="558" y2="156" stroke="#6b7280" stroke-width="1.5" marker-end="url(#mf-l)"/>
	<text x="545" y="144" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">next({ctx})</text>
	<!-- Step 4: Server code -->
	<rect x="560" y="156" width="120" height="28" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1"/>
	<text x="620" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6b21a8">return { data }</text>
	<!-- Arrow: result flows back to validated -->
	<line x1="558" y1="192" x2="505" y2="204" stroke="#22c55e" stroke-width="1.5" marker-end="url(#mf-lg)"/>
	<text x="545" y="202" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">result</text>
	<!-- Step 5: Validated returns -->
	<rect x="380" y="208" width="120" height="28" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
	<text x="440" y="227" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">return result</text>
	<!-- Arrow: result flows back to auth -->
	<line x1="378" y1="232" x2="325" y2="244" stroke="#22c55e" stroke-width="1.5" marker-end="url(#mf-lg)"/>
	<text x="355" y="242" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">result</text>
	<!-- Step 6: Auth returns -->
	<rect x="200" y="248" width="120" height="28" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
	<text x="260" y="267" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1e40af">return result</text>
	<!-- Arrow: result flows back to logging -->
	<line x1="198" y1="272" x2="145" y2="278" stroke="#22c55e" stroke-width="1.5" marker-end="url(#mf-lg)"/>
	<text x="175" y="280" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">result</text>
	<!-- Step 7: Log end -->
	<rect x="20" y="268" width="120" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
	<text x="80" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#92400e">console.log(end)</text>
</svg>
