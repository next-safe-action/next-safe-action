<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" width="720" height="140">
	<defs>
		<marker id="hs-l" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
			<polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
		</marker>
	</defs>
	<!-- idle -->
	<rect x="0" y="44" width="90" height="44" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
	<text x="45" y="71" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">idle</text>
	<!-- Arrow: idle → executing -->
	<line x1="95" y1="66" x2="138" y2="66" stroke="#6b7280" stroke-width="1.5" marker-end="url(#hs-l)"/>
	<text x="116" y="58" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">execute()</text>
	<!-- executing -->
	<rect x="143" y="44" width="110" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
	<text x="198" y="71" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#92400e">executing</text>
	<!-- Arrow: executing → hasSucceeded -->
	<line x1="258" y1="54" x2="360" y2="26" stroke="#6b7280" stroke-width="1.5" marker-end="url(#hs-l)"/>
	<!-- Arrow: executing → hasErrored -->
	<line x1="258" y1="66" x2="360" y2="66" stroke="#6b7280" stroke-width="1.5" marker-end="url(#hs-l)"/>
	<!-- Arrow: executing → hasNavigated -->
	<line x1="258" y1="78" x2="360" y2="110" stroke="#6b7280" stroke-width="1.5" marker-end="url(#hs-l)"/>
	<!-- hasSucceeded -->
	<rect x="365" y="4" width="130" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
	<text x="430" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">hasSucceeded</text>
	<!-- hasErrored -->
	<rect x="365" y="48" width="130" height="40" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
	<text x="430" y="73" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#991b1b">hasErrored</text>
	<!-- hasNavigated -->
	<rect x="365" y="92" width="130" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
	<text x="430" y="117" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#1e40af">hasNavigated</text>
	<!-- reset arrows -->
	<line x1="500" y1="24" x2="548" y2="24" stroke="#6b7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#hs-l)"/>
	<line x1="500" y1="68" x2="548" y2="68" stroke="#6b7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#hs-l)"/>
	<line x1="500" y1="112" x2="548" y2="112" stroke="#6b7280" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#hs-l)"/>
	<!-- reset box -->
	<rect x="553" y="44" width="80" height="44" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 3"/>
	<text x="593" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">reset()</text>
	<text x="593" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">→ idle</text>
</svg>
