<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
	<defs>
		<marker id="eo-d" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
			<polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
		</marker>
		<marker id="eo-dd" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
			<polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
		</marker>
	</defs>
	<!-- Column headers -->
	<text x="150" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#e5e7eb">Declaration order</text>
	<text x="540" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#e5e7eb">Execution order</text>
	<!-- Left column: Declaration order -->
	<rect x="50" y="38" width="200" height="32" rx="6" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
	<text x="150" y="59" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#fde68a">.use(logging)</text>
	<line x1="150" y1="74" x2="150" y2="84" stroke="#4b5563" stroke-width="1.5" marker-end="url(#eo-dd)"/>
	<rect x="50" y="88" width="200" height="32" rx="6" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 3"/>
	<text x="150" y="109" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#86efac">.inputSchema(schema)</text>
	<line x1="150" y1="124" x2="150" y2="134" stroke="#4b5563" stroke-width="1.5" marker-end="url(#eo-dd)"/>
	<rect x="50" y="138" width="200" height="32" rx="6" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
	<text x="150" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#86efac">.useValidated(checkOwner)</text>
	<line x1="150" y1="174" x2="150" y2="184" stroke="#4b5563" stroke-width="1.5" marker-end="url(#eo-dd)"/>
	<rect x="50" y="188" width="200" height="32" rx="6" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
	<text x="150" y="209" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#fde68a">.use(rateLimit)</text>
	<!-- Right column: Execution order -->
	<rect x="440" y="38" width="200" height="32" rx="6" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
	<text x="540" y="59" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#fde68a">logging</text>
	<text x="660" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">use()</text>
	<line x1="540" y1="74" x2="540" y2="84" stroke="#4b5563" stroke-width="1.5" marker-end="url(#eo-dd)"/>
	<rect x="440" y="88" width="200" height="32" rx="6" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
	<text x="540" y="109" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#fde68a">rateLimit</text>
	<text x="660" y="109" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">use()</text>
	<line x1="540" y1="124" x2="540" y2="134" stroke="#4b5563" stroke-width="1.5" marker-end="url(#eo-dd)"/>
	<rect x="440" y="138" width="200" height="32" rx="6" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 3"/>
	<text x="540" y="159" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#86efac">Validate Input</text>
	<line x1="540" y1="174" x2="540" y2="184" stroke="#4b5563" stroke-width="1.5" marker-end="url(#eo-dd)"/>
	<rect x="440" y="188" width="200" height="32" rx="6" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
	<text x="540" y="209" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#86efac">checkOwner</text>
	<text x="660" y="209" font-family="system-ui,sans-serif" font-size="9" fill="#9ca3af">useValidated()</text>
	<line x1="540" y1="224" x2="540" y2="234" stroke="#4b5563" stroke-width="1.5" marker-end="url(#eo-dd)"/>
	<rect x="440" y="238" width="200" height="32" rx="6" fill="#3b0764" stroke="#c084fc" stroke-width="1.5"/>
	<text x="540" y="259" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#d8b4fe">Server Code</text>
	<!-- Connecting dashed lines (matching items left→right) -->
	<line x1="254" y1="54" x2="436" y2="54" stroke="#4b5563" stroke-width="1" stroke-dasharray="3 3"/>
	<line x1="254" y1="204" x2="436" y2="104" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="3 3"/>
	<line x1="254" y1="104" x2="436" y2="154" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="3 3"/>
	<line x1="254" y1="154" x2="436" y2="204" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="3 3"/>
	<!-- Bottom annotation -->
	<text x="350" y="276" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9ca3af">All use() middleware runs before validation. All useValidated() middleware runs after.</text>
</svg>
