<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="620" height="280">
	<!-- Outer: Logging middleware -->
	<rect x="0" y="0" width="620" height="280" rx="12" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
	<text x="20" y="24" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fde68a">Logging Middleware</text>
	<text x="600" y="24" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#fbbf24">console.log → next() → console.log</text>
	<!-- Middle: Auth middleware -->
	<rect x="20" y="38" width="580" height="200" rx="10" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
	<text x="40" y="60" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#93c5fd">Auth Middleware</text>
	<text x="580" y="60" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#60a5fa">getSession() → next({ ctx: { user } })</text>
	<!-- Validated: post-validation middleware -->
	<rect x="44" y="76" width="532" height="142" rx="8" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
	<text x="64" y="98" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#86efac">Validated Middleware</text>
	<text x="556" y="98" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#4ade80">parsedInput typed, ctx from use() available</text>
	<!-- Inner: Server code -->
	<rect x="68" y="114" width="484" height="82" rx="8" fill="#3b0764" stroke="#c084fc" stroke-width="1.5"/>
	<text x="88" y="136" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#d8b4fe">Server Code</text>
	<text x="88" y="156" font-family="system-ui,sans-serif" font-size="11" fill="#c4b5fd">ctx from all middleware available</text>
	<text x="88" y="172" font-family="system-ui,sans-serif" font-size="11" fill="#c4b5fd">parsedInput is validated and typed</text>
	<text x="88" y="188" font-family="system-ui,sans-serif" font-size="11" fill="#c4b5fd">return { ... } → becomes result.data</text>
	<!-- Arrow labels -->
	<text x="310" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#9ca3af">Execution flows inward, results flow outward</text>
</svg>
